name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      # Includes the Avalonia headless GUI smoke test, which needs no display.
      # data/translations.dat is versioned, so no corpus sync is needed in CI.
      - name: Test
        run: dotnet test --no-build -c Release --verbosity minimal
