name: Release

# Tag a commit (e.g. v1.2.3) to build self-contained single-file executables for Windows, Linux and
# macOS and attach them to a GitHub Release. win/linux cross-publish from a Linux runner; the macOS
# RID (Apple Silicon only) builds on a macOS runner so the .app bundle can be ad-hoc codesigned.
on:
  push:
    tags: [ 'v*.*.*' ]

permissions:
  contents: write

jobs:
  validate-tag:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Validate tag and derive version
        id: version
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          if [[ ! "$TAG" =~ ^v(0|[1-9][0-9]{0,2})\.(0|[1-9][0-9]{0,2})\.(0|[1-9][0-9]{0,2})$ ]]; then
            echo "::error::Release tags must match vX.Y.Z, with each number from 0 to 999."
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

  publish:
    needs: validate-tag
    # win/linux cross-publish from Linux; osx-arm64 builds on a macOS runner so the bundle can be
    # ad-hoc codesigned (mandatory for arm64 to run at all, and removes the "damaged" Gatekeeper error).
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # nexus_file_id: "API Info" del fichero en la pestaña Files de nexusmods.com (mod 2513).
          - { rid: win-x64,   os: ubuntu-latest, nexus_file_id: 7608014 }
          - { rid: linux-x64, os: ubuntu-latest, nexus_file_id: 7651772 }
          # macos-latest pinned to macos-15: the "latest" label migrates to macOS 26 (beta) from
          # 2026-06-15, before it is a stable target for the ad-hoc codesign/publish steps below.
          - { rid: osx-arm64, os: macos-15,  nexus_file_id: 7608017 }
    steps:
      - uses: actions/checkout@v5
        with:
          lfs: true

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Publish ${{ matrix.rid }}
        run: >
          dotnet publish src/FFXIVSpanishPatcher.App/FFXIVSpanishPatcher.App.csproj
          -c Release -r ${{ matrix.rid }} --self-contained
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:Version=${{ needs.validate-tag.outputs.version }}
          -p:InformationalVersion=${{ needs.validate-tag.outputs.tag }}
          -p:AssemblyVersion=${{ needs.validate-tag.outputs.version }}.0
          -p:FileVersion=${{ needs.validate-tag.outputs.version }}.0
          -p:RepositorySlug=${{ github.repository }}
          -p:LatestReleaseApiUrl=https://api.github.com/repos/${{ github.repository }}/releases/latest
          -p:LatestReleasePageUrl=https://github.com/${{ github.repository }}/releases/latest
          -o publish/${{ matrix.rid }}

      - name: Package
        run: |
          set -euo pipefail
          VERSION="${{ needs.validate-tag.outputs.version }}"
          RID="${{ matrix.rid }}"
          OUT="publish/$RID"
          ASSET="FFXIVSpanishPatcher-$VERSION-$RID.zip"
          rm -f "$OUT"/*.pdb
          if [[ "$RID" == osx-* ]]; then
            # Assemble a proper .app bundle so macOS shows the icon (Dock/Finder) and a real app name.
            APP="FFXIVSpanishPatcher.app"
            rm -rf "$APP"
            mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
            cp "$OUT/FFXIVSpanishPatcher" "$APP/Contents/MacOS/FFXIVSpanishPatcher"
            chmod +x "$APP/Contents/MacOS/FFXIVSpanishPatcher"
            cp src/FFXIVSpanishPatcher.App/Assets/icon.icns "$APP/Contents/Resources/icon.icns"
            sed "s/__VERSION__/$VERSION/g" build/macos/Info.plist > "$APP/Contents/Info.plist"
            # Ad-hoc sign (inner Mach-O, then the bundle). Required for arm64 to launch and removes
            # the "is damaged" Gatekeeper error. Not notarized: users still "Open Anyway" once.
            codesign --force --timestamp=none --sign - "$APP/Contents/MacOS/FFXIVSpanishPatcher"
            codesign --force --timestamp=none --sign - "$APP"
            codesign --verify --strict --verbose=2 "$APP"
            # ditto is Apple's archiver; it preserves the code signature and bundle layout.
            ditto -c -k --keepParent "$APP" "$ASSET"
          else
            cp README.md "$OUT/README.md"
            ( cd "$OUT" && zip -r "../../$ASSET" . )
          fi

      - name: Attach to release
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ needs.validate-tag.outputs.tag }}
          generate_release_notes: true
          files: FFXIVSpanishPatcher-${{ needs.validate-tag.outputs.version }}-${{ matrix.rid }}.zip

      # Nexus/Windows false-positive mitigation: keep the GitHub asset as single-file, but replace
      # the local zip before the Nexus upload with a portable folder publish. This avoids the .NET
      # single-file self-extraction pattern that VirusTotal/Zenbox flagged as suspicious.
      - name: Build Nexus Mods portable package (Windows)
        if: matrix.rid == 'win-x64' && matrix.nexus_file_id != ''
        run: |
          set -euo pipefail
          VERSION="${{ needs.validate-tag.outputs.version }}"
          RID="${{ matrix.rid }}"
          OUT="publish/$RID-nexus"
          ROOT="nexus/$RID/FFXIVSpanishPatcher"
          ASSET="FFXIVSpanishPatcher-$VERSION-$RID.zip"
          rm -rf "$OUT" "nexus/$RID" "$ASSET"
          dotnet publish src/FFXIVSpanishPatcher.App/FFXIVSpanishPatcher.App.csproj \
            -c Release -r "$RID" --self-contained \
            -p:PublishSingleFile=false \
            -p:IncludeNativeLibrariesForSelfExtract=false \
            -p:ExternalTranslations=true \
            -p:DebuggerSupport=false \
            -p:EventSourceSupport=false \
            -p:DebugType=none \
            -p:DebugSymbols=false \
            -p:Version="$VERSION" \
            -p:InformationalVersion="${{ needs.validate-tag.outputs.tag }}" \
            -p:AssemblyVersion="$VERSION.0" \
            -p:FileVersion="$VERSION.0" \
            -p:RepositorySlug="${{ github.repository }}" \
            -p:LatestReleaseApiUrl="https://api.github.com/repos/${{ github.repository }}/releases/latest" \
            -p:LatestReleasePageUrl="https://github.com/${{ github.repository }}/releases/latest" \
            -o "$OUT"
          mkdir -p "$ROOT"
          cp -a "$OUT"/. "$ROOT"/
          rm -f "$ROOT"/*.pdb
          cp README.md "$ROOT/README.md"
          (
            cd "$ROOT"
            find . -maxdepth 1 -type f ! -name SHA256SUMS.txt -printf '%P\0' \
              | sort -z \
              | xargs -0 sha256sum > SHA256SUMS.txt
          )
          ( cd "nexus/$RID" && zip -r "../../$ASSET" "FFXIVSpanishPatcher" )

      # Sube el zip como nueva versión del fichero existente en Nexus Mods (Upload API v3, beta).
      # Requiere el secret NEXUSMODS_API_KEY (Site Preferences -> API Keys en nexusmods.com).
      - name: Prepare Nexus Mods description
        id: nexus-description
        if: matrix.nexus_file_id != ''
        shell: bash
        run: |
          VERSION="${{ needs.validate-tag.outputs.version }}"
          RID="${{ matrix.rid }}"

          case "$RID" in
            win-x64)
              DESCRIPTION="Versión $VERSION para Windows 11. Si la descarga aún no está disponible en Nexus (validación manual pendiente), puedes bajarla ya desde GitHub: https://github.com/${{ github.repository }}/releases/latest"
              ;;
            linux-x64)
              DESCRIPTION="Versión $VERSION para Linux (x64)"
              ;;
            osx-arm64)
              DESCRIPTION="Versión $VERSION para macOS Apple Silicon"
              ;;
            *)
              echo "::error::RID no soportado: $RID"
              exit 1
              ;;
          esac

          echo "description=$DESCRIPTION" >> "$GITHUB_OUTPUT"

      - name: Upload to Nexus Mods
        if: matrix.nexus_file_id != ''
        uses: Nexus-Mods/upload-action@f6e1e2ea683dfe8f88cccf642c6e0e69ab66825e # v1.0.0-beta.8
        with:
          api_key: ${{ secrets.NEXUSMODS_API_KEY }}
          file_id: ${{ matrix.nexus_file_id }}
          filename: FFXIVSpanishPatcher-${{ needs.validate-tag.outputs.version }}-${{ matrix.rid }}.zip
          version: ${{ needs.validate-tag.outputs.version }}
          display_name: FFXIVSpanishPatcher ${{ needs.validate-tag.outputs.version }} (${{ matrix.rid }})
          description: ${{ steps.nexus-description.outputs.description }}
          archive_existing_version: true
